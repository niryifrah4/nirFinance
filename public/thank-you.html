<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה! · ניר יפרח CFP</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

  <!-- Meta Pixel: fire Lead event for ad attribution -->
  <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?
    n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;
    n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;
    t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window,
    document,'script','https://connect.facebook.net/en_US/fbevents.js');
    fbq('init', '952357363915643');
    fbq('track', 'PageView');
    fbq('track', 'Lead');
  </script>
  <noscript><img height="1" width="1" style="display:none"
    src="https://www.facebook.com/tr?id=952357363915643&ev=Lead&noscript=1"/></noscript>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #F5F2EC;
      min-height: 100vh;
      font-family: 'Heebo', Arial, sans-serif;
      direction: rtl;
      position: relative;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
    }
    .blob1 {
      position: absolute; right: -8rem; top: 4rem;
      width: 24rem; height: 24rem; border-radius: 9999px;
      background: rgba(173,254,122,0.18);
      filter: blur(100px); pointer-events: none;
    }
    .blob2 {
      position: absolute; bottom: 0; left: -6rem;
      width: 20rem; height: 20rem; border-radius: 9999px;
      background: rgba(22,52,45,0.05);
      filter: blur(100px); pointer-events: none;
    }
    main {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 60px 24px 80px;
      text-align: center;
      position: relative;
      z-index: 1;
    }
    .check {
      width: 96px; height: 96px;
      border-radius: 9999px;
      background: #ADFE7A;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 32px;
      box-shadow: 0 16px 48px rgba(173,254,122,0.35),
                  0 0 0 12px rgba(173,254,122,0.18);
      animation: pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    @keyframes pop {
      0% { transform: scale(0); opacity: 0; }
      60% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    h1 {
      font-size: clamp(2.4rem, 5vw, 3.8rem);
      font-weight: 900;
      color: #16342D;
      letter-spacing: -0.025em;
      line-height: 1.1;
      margin-bottom: 16px;
    }
    .confirm {
      font-size: clamp(1.05rem, 1.45vw, 1.25rem);
      color: #16342D;
      line-height: 1.5;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin-bottom: 36px;
      max-width: 560px;
    }
    .gift-box {
      background: #fff;
      border: 1px solid rgba(22,52,45,0.08);
      border-radius: 16px;
      padding: 28px 28px 26px;
      max-width: 520px;
      width: 100%;
      margin-bottom: 40px;
      text-align: center;
      box-shadow: 0 8px 24px rgba(22,52,45,0.06);
    }
    .gift-icon-wrap {
      width: 56px; height: 56px;
      margin: 0 auto 14px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(173,254,122,0.22);
      border-radius: 14px;
    }
    .gift-eyebrow {
      font-size: 11px; font-weight: 800;
      letter-spacing: 0.2em;
      color: #16342D;
      opacity: 0.6;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .gift-title {
      font-size: 18px; color: #16342D;
      line-height: 1.4; margin-bottom: 20px;
      font-weight: 800; letter-spacing: -0.01em;
    }
    .download-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: #16342D; color: #fff;
      font-size: 15px; font-weight: 900;
      padding: 14px 30px;
      border-radius: 9999px;
      text-decoration: none;
      letter-spacing: -0.01em;
      box-shadow: 0 6px 20px rgba(22,52,45,0.18);
      transition: transform 0.15s, box-shadow 0.2s, background 0.2s;
    }
    .download-btn:hover {
      transform: translateY(-1px);
      background: #0f211b;
      box-shadow: 0 10px 28px rgba(22,52,45,0.25);
    }
    .gift-note {
      font-size: 12px;
      color: #5C5A54;
      margin-top: 16px;
      font-weight: 500;
      line-height: 1.5;
    }
    .meanwhile-eyebrow {
      font-size: 11px; font-weight: 800;
      color: rgba(22,52,45,0.5);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .video-btn {
      display: inline-flex; align-items: center; gap: 10px;
      background: transparent; color: #16342D;
      padding: 12px 24px;
      border: 1.5px solid rgba(22,52,45,0.2);
      border-radius: 9999px;
      text-decoration: none;
      font-weight: 700; font-size: 14px;
      letter-spacing: -0.005em;
      transition: background 0.2s, border-color 0.2s;
    }
    .video-btn:hover {
      background: rgba(22,52,45,0.06);
      border-color: #16342D;
    }
  </style>
</head>
<body>
  <div class="blob1"></div>
  <div class="blob2"></div>

  <main>
    <!-- Animated checkmark -->
    <div class="check">
      <svg viewBox="0 0 24 24" style="width:48px;height:48px;fill:none;stroke:#14322B;stroke-width:3;stroke-linecap:round;stroke-linejoin:round;" aria-hidden="true">
        <path d="M4 12.6l5.2 5.2L20 7" />
      </svg>
    </div>

    <h1>תודה!</h1>

    <p class="confirm">הפרטים התקבלו ואצור קשר בהקדם.</p>

    <!-- Gift box -->
    <div class="gift-box">
      <div class="gift-icon-wrap">
        <!-- Flat gift icon -->
        <svg viewBox="0 0 24 24" style="width:28px;height:28px;fill:none;stroke:#16342D;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;" aria-hidden="true">
          <path d="M3 8h18v4H3z"/>
          <path d="M5 12h14v9H5z"/>
          <path d="M12 8v13"/>
          <path d="M8 8c-1.5 0-2.5-1-2.5-2.5C5.5 4 7 3.5 8 4c1.5.5 2.5 2 4 4-2 0-3 0-4 0Z"/>
          <path d="M16 8c1.5 0 2.5-1 2.5-2.5C18.5 4 17 3.5 16 4c-1.5.5-2.5 2-4 4 2 0 3 0 4 0Z"/>
        </svg>
      </div>
      <div class="gift-eyebrow">המתנה שלי אליכם</div>
      <p class="gift-title">הצ'ק ליסט הפיננסי המקיף</p>

      <a href="https://bit.ly/fchecklist" target="_blank" rel="noopener noreferrer" class="download-btn">
        <svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" aria-hidden="true">
          <path d="M12 4v12"/>
          <path d="M6 12l6 6 6-6"/>
          <path d="M5 20h14"/>
        </svg>
        הורדת הצ'ק ליסט
      </a>

      <p class="gift-note">Google Sheets · עדיף לפתוח במחשב</p>
    </div>
  </main>
</body>
</html>
